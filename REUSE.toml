version = 1
SPDX-PackageName = "create-fastify-enterprise"
SPDX-PackageSupplier = "Your Org"
SPDX-PackageDownloadLocation = "https://github.com/your-org/create-fastify-enterprise"

# Files that can't carry an in-file SPDX header (JSON has no comments,
# lockfiles are generated, etc.).
[[annotations]]
path = [
  "package.json",
  "package-lock.json",
  "tsconfig.json",
  ".lintstagedrc.json",
  ".prettierrc.json",
  "release-please-config.json",
  ".release-please-manifest.json",
]
SPDX-FileCopyrightText = "2025 Your Org"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = ["README.md", "CHANGELOG.md", ".nvmrc", ".gitignore", ".prettierignore"]
SPDX-FileCopyrightText = "2025 Your Org"
SPDX-License-Identifier = "MIT"

# Everything under templates/ is its own REUSE-compliant project (see
# templates/default/REUSE.toml) generated *for end users* — its files carry
# __PLACEHOLDER__ tokens until scaffolded, so they're annotated here instead
# of relying on in-file headers being parsed literally.
[[annotations]]
path = "templates/**"
SPDX-FileCopyrightText = "2025 Your Org"
SPDX-License-Identifier = "MIT"
